# NOTE: The `macos-14` runner does not yet support macOS 26 Tahoe APIs.
# Once GitHub Actions publishes a Tahoe runner (e.g. `macos-26`), update
# `runs-on:` below. Until then, releases must be built locally with:
#
#   xcodegen generate && xcodebuild -configuration Release ...
#   zip -r SanJiaoIM-v0.1.0.zip SanJiaoIM.app
#   gh release create v0.1.0 SanJiaoIM-v0.1.0.zip
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build Lexicon.bin
        run: ./scripts/build-lexicon.sh
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build release app
        run: |
          xcodebuild -project SanJiaoIM.xcodeproj -scheme SanJiaoIM \
            -configuration Release -derivedDataPath build build
      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -r "../../../../SanJiaoIM-${GITHUB_REF_NAME}.zip" SanJiaoIM.app
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SanJiaoIM-*.zip
